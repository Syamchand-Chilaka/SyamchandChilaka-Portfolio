<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #1c1c1c, #282828);
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        header {
            text-align: center;
            padding: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        h1 {
            font-size: 3em;
            margin: 0;
        }
        section {
            padding: 20px;
        }
        .progress {
            background-color: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            width: 100%;
            margin: 10px 0;
        }
        .progress-bar {
            background-color: #76c7c0;
            height: 20px;
            width: 0;
            transition: width 0.4s;
        }
        .timeline {
            position: relative;
            padding: 20px 0;
        }
        .timeline-item {
            margin: 10px 0;
        }
        .project {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }
        .contact-form {
            display: flex;
            flex-direction: column;
            max-width: 400px;
            margin: auto;
        }
        .contact-form input, .contact-form textarea {
            margin: 10px 0;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Premium Portfolio</h1>
    </header>
    <section id="skills">
        <h2>My Skills</h2>
        <div class="progress">
            <div class="progress-bar" style="width:80%;">HTML</div>
        </div>
        <div class="progress">
            <div class="progress-bar" style="width:70%;">CSS</div>
        </div>
        <div class="progress">
            <div class="progress-bar" style="width:75%;">JavaScript</div>
        </div>
    </section>
    <section id="experience" class="timeline">
        <h2>Experience Timeline</h2>
        <div class="timeline-item">2025 - Frontend Developer at XYZ Corp</div>
        <div class="timeline-item">2024 - Intern at ABC Inc</div>
    </section>
    <section id="projects">
        <h2>Featured Projects</h2>
        <div class="project">
            <div>Project 1: Amazing Web App</div>
            <div>Project 2: Awesome Game</div>
            <div>Project 3: Cool Mobile App</div>
        </div>
    </section>
    <section id="contact">
        <h2>Contact Me</h2>
        <form class="contact-form">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>
</body>
</html>
