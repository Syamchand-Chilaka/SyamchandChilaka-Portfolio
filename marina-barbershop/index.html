<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marina Barbershop — AI Call Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>✂️ Marina Barbershop</h1>
        <p>AI Call Assistant</p>
    </header>

    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="quick-actions">
            <button class="quick-chip" data-msg="How much is a haircut?">💇 Prices</button>
            <button class="quick-chip" data-msg="What are your hours?">🕐 Hours</button>
            <button class="quick-chip" data-msg="Where are you located?">📍 Location</button>
            <button class="quick-chip" data-msg="Do you take walk-ins?">🚶 Walk-ins</button>
            <button class="quick-chip" data-msg="I want to book an appointment">📅 Book</button>
        </div>

        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type your message…" autocomplete="off">
            <button id="sendBtn" aria-label="Send message">&#10148;</button>
        </div>

        <div class="info-bar">
            <span>📍 865 Bergen Ave Ste 2, Jersey City, NJ</span>
            <span>📞 <a href="tel:+17324768923">(732) 476-8923</a></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
